name: Quick Scan (Track A)

on:
  schedule:
    # KST 0시, 2시, 4시, 6시 (= UTC 15, 17, 19, 21시) 월~금
    - cron: '0 15,17,19,21 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  quick-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run quick scan
        id: scan
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          python quick_scan.py --no-color 2>&1 | tee scan_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Also generate JSON for email
          python quick_scan.py --json > scan_output.json 2>/dev/null || true
          echo "EXIT_CODE=$EXIT_CODE"
          exit 0

      - name: Send alert email (trigger fired)
        if: steps.scan.outputs.exit_code == '1'
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        working-directory: scripts
        run: |
          python send_report.py \
            --subject "🚨 분할매수 트리거 충족! — Quick Scan $(date +%Y-%m-%d)" \
            --body-file scan_output.txt

      - name: Send daily scan summary
        if: steps.scan.outputs.exit_code == '0'
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        working-directory: scripts
        run: |
          python send_report.py \
            --subject "📊 Quick Scan — $(date +%Y-%m-%d %H:%M) UTC" \
            --body-file scan_output.txt

      - name: Upload scan result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-scan-${{ github.run_number }}
          path: scripts/scan_output.*
          retention-days: 7
