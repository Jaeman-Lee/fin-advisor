name: Daily Analysis (Track B)

on:
  schedule:
    # KST 07:00 (= UTC 22:00) 월~금, 미장 마감 후
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # 수동 실행 가능
    inputs:
      skip_collection:
        description: 'Skip data collection'
        required: false
        default: 'false'
        type: boolean

jobs:
  daily-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy pandas-ta nltk beautifulsoup4 python-dateutil
          python -c "import nltk; nltk.download('vader_lexicon', quiet=True)" || true

      - name: Initialize database
        run: python scripts/init_db.py

      - name: Run daily analysis
        id: analysis
        env:
          SKIP_FLAG: ${{ github.event.inputs.skip_collection == 'true' && '--skip-collection' || '' }}
        run: |
          set +e
          python scripts/daily_analysis.py --no-color --days 90 $SKIP_FLAG 2>&1 | tee analysis_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Find the generated report
          REPORT=$(ls -t data/daily_logs/daily_*.md 2>/dev/null | head -1)
          echo "report_path=$REPORT" >> $GITHUB_OUTPUT
          echo "EXIT_CODE=$EXIT_CODE, REPORT=$REPORT"
          exit 0

      - name: Send trigger alert email
        if: steps.analysis.outputs.exit_code == '1'
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          REPORT="${{ steps.analysis.outputs.report_path }}"
          python scripts/send_report.py \
            --subject "🚨 분할매수 트리거 충족! — Daily Analysis $(date +%Y-%m-%d)" \
            --body-file "$REPORT" \
            --attach "$REPORT"

      - name: Send daily report email
        if: steps.analysis.outputs.exit_code == '0'
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          REPORT="${{ steps.analysis.outputs.report_path }}"
          python scripts/send_report.py \
            --subject "📈 Daily Portfolio Report — $(date +%Y-%m-%d)" \
            --body-file "$REPORT" \
            --attach "$REPORT"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: |
            data/daily_logs/
            analysis_output.txt
          retention-days: 30
